config:
  validation: true

ktlint:
  active: true
  code_style: android_studio
  autoCorrect: true

style:
  MagicNumber:
    active: true
    ignoreNumbers:
      - '-1'
      - '0'
      - '1'
      - '2'
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreAnnotation: true
    ignoreEnums: true
    ignoreRanges: true
    ignoreExtensionFunctions: true

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
